<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remind me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #181818; --border: #2a2a2a;
    --accent: #c8f060; --accent2: #60c8f0; --muted: #555;
    --text: #e8e8e8; --subtext: #888; --error: #f06060; --radius: 12px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-weight: 300; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3; pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; width: 100%; max-width: 620px; display: flex; flex-direction: column; gap: 28px; }
  header { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 500; }
  h1 { font-family: 'Instrument Serif', serif; font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 400; line-height: 1.05; letter-spacing: -0.02em; }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle { font-size: 12px; color: var(--subtext); margin-top: 4px; line-height: 1.6; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 14px; transition: border-color 0.2s; }
  .card:focus-within { border-color: #3a3a3a; }
  textarea { background: transparent; border: none; outline: none; resize: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px; line-height: 1.65; width: 100%; min-height: 90px; caret-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 14px; }
  .default-time { font-size: 11px; color: var(--subtext); letter-spacing: 0.05em; }
  .default-time span { color: var(--accent2); }
  button { background: var(--accent); color: #0f0f0f; border: none; border-radius: 8px; padding: 10px 20px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  button:hover:not(:disabled) { opacity: 0.85; }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .hidden { display: none !important; }
  .review-box { background: rgba(96,200,240,0.05); border: 1px solid rgba(96,200,240,0.2); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .review-title { font-weight: 500; color: var(--accent2); margin-bottom: 8px; font-size: 14px; }
  .event-row { display: flex; gap: 12px; font-size: 12px; margin-bottom: 4px; }
  .event-row .key { color: var(--subtext); min-width: 48px; }
  .status { border-radius: var(--radius); padding: 16px 20px; font-size: 13px; line-height: 1.6; display: none; }
  .status.visible { display: block; }
  .status.success { background: rgba(200,240,96,.07); border: 1px solid rgba(200,240,96,.25); color: var(--accent); }
  .status.error   { background: rgba(240,96,96,.07);  border: 1px solid rgba(240,96,96,.25);  color: var(--error); }
  .hint { font-size: 10px; color: var(--muted); text-align: right; margin-top: -16px; }
  kbd { background: var(--border); border-radius: 4px; padding: 1px 5px; }
</style>
</head>
<body>
<div class="container" id="app-container" style="display: none;">

  <header>
    <div class="label">Reminder Agent</div>
    <h1>What do you need to<br><em>remember tonight?</em></h1>
    <p class="subtitle">Type anything naturally. Default time: <span style="color:var(--accent2)">7:00 PM</span> if unspecified.</p>
  </header>

  <div class="card" id="inputCard">
    <textarea id="reminderInput" placeholder="e.g. call mom tomorrow, dentist next Thursday..." rows="4" autofocus></textarea>
    <div class="card-footer">
      <div class="default-time">Default: <span>7:00 PM</span></div>
      <button id="parseBtn" onclick="parseReminder()">Parse Event</button>
    </div>
  </div>
  <p class="hint" id="inputHint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> to parse</p>

  <div class="card hidden" id="reviewCard">
    <div class="review-box" id="reviewDetails"></div>
    <div class="card-footer">
      <button class="btn-outline" onclick="cancelReview()">← Edit</button>
      <button id="sendBtn" onclick="confirmAndSend()">Confirm & Send →</button>
    </div>
  </div>

  <div class="status" id="statusBox"></div>

</div>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    try {
      const res = await fetch('/api/app', {
        method: 'GET',
        credentials: 'same-origin'
      });

      if (res.status === 401) {
        window.location.replace('/login');
        return;
      }

      // If 200 (OK) OR even if it's 500 (Error), show the UI so we can see the app
      document.getElementById('app-container').style.display = 'flex';

    } catch (err) {
      // Fallback: Show the UI anyway if the fetch fails entirely
      document.getElementById('app-container').style.display = 'flex';
    }
  });

  // --- AUTH GATEKEEPER ---
  document.addEventListener("DOMContentLoaded", async () => {
    try {
      const res = await fetch('/api/app', {
        method: 'GET',
        credentials: 'same-origin'
      });

      if (res.status === 401) {
        // Not logged in. Kick to login page.
        window.location.replace('/login');
      } else if (res.ok) {
        // Authenticated. Reveal the UI.
        document.getElementById('app-container').style.display = 'flex';
        document.getElementById('reminderInput').focus();
      }
    } catch (err) {
      console.error("Auth check failed.", err);
      // Failsafe: if the backend is totally unreachable, you might want to show an error
      document.body.innerHTML = '<p style="text-align:center; margin-top:50px;">Cannot connect to server.</p>';
    }
  });
  // -----------------------

  let currentEventDraft = null;

  const inputCard  = document.getElementById('inputCard');
  const reviewCard = document.getElementById('reviewCard');
  const input      = document.getElementById('reminderInput');
  const parseBtn   = document.getElementById('parseBtn');
  const sendBtn    = document.getElementById('sendBtn');
  const status     = document.getElementById('statusBox');

  input.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') parseReminder();
  });

  async function apiCall(action, extra = {}) {
    // UPDATED: Points to the renamed /api/index backend
    const res = await fetch('/api/app', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ action, ...extra }),
    });

    if (res.status === 401) {
      window.location.href = '/login';
      return null;
    }

    return res;
  }

  async function parseReminder() {
    const text = input.value.trim();
    if (!text) return;

    setLoading(parseBtn, true, 'Parsing...');
    clearStatus();

    try {
      const res = await apiCall('parse', {
        text,
        clientTime: new Date().toISOString(),
      });
      if (!res) return;

      const data = await res.json();
      if (!res.ok || data.error) { showError(data.error || 'Parsing failed.'); return; }

      currentEventDraft = data.event;
      showReviewStep(currentEventDraft);

    } catch {
      showError('Could not reach the server.');
    } finally {
      setLoading(parseBtn, false, 'Parse Event');
    }
  }

  async function confirmAndSend() {
    if (!currentEventDraft) return;

    setLoading(sendBtn, true, 'Sending...');

    try {
      const res = await apiCall('send', { event: currentEventDraft });
      if (!res) return;

      const data = await res.json();
      if (!res.ok || data.error) { showError(data.error || 'Failed to send.'); return; }

      showSuccess();
      cancelReview();
      input.value = '';

    } catch {
      showError('Could not reach the server.');
    } finally {
      setLoading(sendBtn, false, 'Confirm & Send →');
    }
  }

  function showReviewStep(event) {
    inputCard.classList.add('hidden');
    document.getElementById('inputHint').classList.add('hidden');
    reviewCard.classList.remove('hidden');

    const d = new Date(event.datetime);
    const dateStr = d.toLocaleDateString(undefined, {
      weekday: 'long', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit',
    });

    document.getElementById('reviewDetails').innerHTML = `
      <div class="review-title">Confirm Event</div>
      <div class="event-row"><span class="key">Event</span><span>${esc(event.title)}</span></div>
      <div class="event-row"><span class="key">When</span><span>${esc(dateStr)}</span></div>
      ${event.notes ? `<div class="event-row"><span class="key">Notes</span><span>${esc(event.notes)}</span></div>` : ''}
    `;
  }

  function cancelReview() {
    currentEventDraft = null;
    reviewCard.classList.add('hidden');
    inputCard.classList.remove('hidden');
    document.getElementById('inputHint').classList.remove('hidden');
    setTimeout(() => input.focus(), 10);
  }

  function setLoading(btn, on, text) { btn.disabled = on; btn.textContent = text; }
  function clearStatus() { status.className = 'status'; status.innerHTML = ''; }
  function showSuccess() {
    status.className = 'status success visible';
    status.innerHTML = '✓ Reminder successfully scheduled — check your Proton inbox.';
    setTimeout(clearStatus, 6000);
  }
  function showError(msg) {
    status.className = 'status error visible';
    status.innerHTML = `✗ ${esc(msg)}`;
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
