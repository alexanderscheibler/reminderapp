<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remind me — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0f0f0f;--surface:#181818;--border:#2a2a2a;--accent:#c8f060;--text:#e8e8e8;--subtext:#888;--error:#f06060;--muted:#555;--radius:12px; }
  html,body { height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-weight:300; }
  body { display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px; }
  body::before { content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3;pointer-events:none;z-index:0; }
  .box { position:relative;z-index:1;width:100%;max-width:380px;display:flex;flex-direction:column;gap:24px; }
  .label { font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:500; }
  h1 { font-family:'Instrument Serif',serif;font-size:2.2rem;font-weight:400;line-height:1.1;letter-spacing:-.02em; }
  h1 em { font-style:italic;color:var(--accent); }
  .card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:14px; }
  input[type="password"] { background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:15px;font-weight:300;width:100%;caret-color:var(--accent);letter-spacing:.1em; }
  input::placeholder { color:var(--muted);letter-spacing:0; }
  .card-footer { display:flex;justify-content:flex-end;border-top:1px solid var(--border);padding-top:14px; }
  button { background:var(--accent);color:#0f0f0f;border:none;border-radius:8px;padding:10px 20px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.08em;cursor:pointer;transition:opacity .15s,transform .1s; }
  button:hover:not(:disabled) { opacity:.85; }
  button:disabled { opacity:.4;cursor:not-allowed; }
  .error { font-size:12px;color:var(--error);display:none; }
  .error.visible { display:block; }
</style>
</head>
<body>
<div class="box">
  <header>
    <div class="label">Reminder Agent</div>
    <h1>Welcome <em>back.</em></h1>
  </header>
  <div class="card">
    <input type="password" id="pw" placeholder="Enter your password" autofocus />
    <div class="card-footer">
      <button id="btn" onclick="login()">→ Enter</button>
    </div>
  </div>
  <div class="error" id="err"></div>
</div>
<script>
  const pw  = document.getElementById('pw');
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  pw.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  async function login() {
    const password = pw.value;
    if (!password) return;
    btn.disabled = true;
    btn.textContent = 'Checking...';
    err.classList.remove('visible');

    try {
      // Password goes to the SERVER for comparison.
      // Server sets an HttpOnly cookie — JS never sees it.
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (!res.ok) {
        err.textContent = data.error || 'Login failed.';
        err.classList.add('visible');
        pw.value = '';
        pw.focus();
        return;
      }
      window.location.href = '/index.html';
    } catch {
      err.textContent = 'Could not reach the server.';
      err.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = '→ Enter';
    }
  }
</script>
</body>
</html>
